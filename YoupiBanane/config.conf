server {
    listen 8081;
    root YoupiBanane;

	cgi {
		.bla /cgi_tester;
	}

    location / {
        methods GET;
        autoindex on;
    }

    location /post_body {
        methods POST;
        clientMaxBodySize 100;
    }

    location /directory {
        methods GET;
        root YoupiBanane;
        index youpi.bad_extension;
        autoindex off;
    }
}
