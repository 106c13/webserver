server {
    listen 8080;
    server_name localhost mysite.com;
    root test_page/test;
    client_max_body_size 1MB;
    error_page 404 errorPages/404.html;
    error_page 403 errorPages/403.html;
    error_page 500 errorPages/500.html;
    error_page 503 errorPages/503.html;

    # location 1
    location / {
        root test_page/test;
        methods GET;
        index index.html;
        autoindex on;
        uploadDir /tmp/uploads;
        clientMaxBodySize 512KB;
        hasClientMaxBodySize true;
        cgi {
            .bla test_page/test/cgi_test;
        }
    }

    location /post_body/ {
        root test_page/test;
        methods POST;
        index index.html;
        autoindex on;
        uploadDir /tmp/uploads;
        clientMaxBodySize 512KB;
        hasClientMaxBodySize true;
        cgi {
            .bla test_page/test/cgi_test;
        }
    }

    location /directory/ {
        root test_page/test/YoupiBanane;
        methods GET;
        index youpi.bad_extension;
        autoindex on;
        uploadDir /tmp/uploads;
        clientMaxBodySize 512KB;
        hasClientMaxBodySize true;
        cgi {
            .bla test_page/test/cgi_test;
        }
    }
}
