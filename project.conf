# Retro
server {
    listen 8080;
    server_name localhost mysite.com;
    root test_page/login;
    error_page 404 404.html;

    location / {
        root test_page/login;
        methods GET POST DELETE;
        index index.php;
        uploadDir /home/necro/Desktop/webserv/test_pages/login/uploads;
        clientMaxBodySize 1MB;
        hasClientMaxBodySize true;
        cgi {
            .php /usr/bin/php-cgi;
        }
    }
}

# Login
server {
    listen 8081;
    server_name localhost mysite.com;
    root test_page/retro;
    client_max_body_size 1MB;
    error_page 404 errorPages/404.html;
    error_page 403 errorPages/403.html;
    error_page 500 errorPages/500.html;
    error_page 503 errorPages/503.html;

    # location 1
    location / {
        root test_page/retro;
        methods GET POST;
        index index.html;
        autoindex on;
        uploadDir /tmp/uploads;
        clientMaxBodySize 512KB;
        hasClientMaxBodySize true;
    }
}

# file_upload
server {
    listen 8082;
    server_name localhost mysite.com;
    root test_page/file_upload;
    client_max_body_size 1MB;

    location / {
        root test_page/file_upload;
        methods GET POST;
        index index.html;
        autoindex on;
        uploadDir /tmp/;
        clientMaxBodySize 1GB;
        hasClientMaxBodySize true;
    }
}
