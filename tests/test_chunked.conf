server {
    listen 19191;
    server_name localhost;
    root tests/www;

    location / {
        root tests/www;
        methods GET POST;
        index index.html;
        uploadDir /tmp/;
        clientMaxBodySize 0;
        hasClientMaxBodySize false;
        cgi {}
    }

    location /cgi {
        root tests/www;
        methods GET POST;
        uploadDir /tmp/;
        clientMaxBodySize 0;
        hasClientMaxBodySize false;
        cgi {
            .cgi cgi/echo;
        }
    }
}
